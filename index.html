<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Library</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
    }
    h1 {
      text-align: center;
    }
    .options {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }
    a {
      display: block;
      padding: 14px 18px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      text-decoration: none;
      color: #222;
      font-weight: 600;
    }
    a:hover {
      background: #eef6ff;
    }
  </style>
</head>
<body>
  <h1>Select a PDF</h1>

  <div class="options">
    <a href="pdfs/option1.pdf" target="_blank">Option 1</a>
    <a href="pdfs/option2.pdf" target="_blank">Option 2</a>
    <a href="pdfs/option3.pdf" target="_blank">Option 3</a>
  </div>
</body>
</html>
