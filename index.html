<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Demo Site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f7fb;
      color: #1f2937;
    }
    h1 {
      margin-bottom: 8px;
    }
    p {
      color: #4b5563;
    }
    .options {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }
    a {
      display: block;
      padding: 16px 18px;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      text-decoration: none;
      color: #111827;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    a:hover {
      background: #eff6ff;
      border-color: #93c5fd;
    }
    code {
      background: #e5e7eb;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Choose a PDF/Link</h1>
  <p>Exapmle Page.</p>

  <div class="options">
    <a href="https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform"
    target="_blank"
    style="display:inline-block;padding:14px 20px;background:#2563eb;color:white;
            text-decoration:none;border-radius:10px;font-weight:600;margin-top:20px;">
    Register here
    </a>
    <a href="pdfs/report-1.pdf" target="_blank">Open dummy PDF 1</a>
    <a href="pdfs/report-2.pdf" target="_blank">Open dummy PDF 2</a>
    <a href="pdfs/report-3.pdf" target="_blank">Open dummy PDF 3</a>
  </div>
</body>
</html>
